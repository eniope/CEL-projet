<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversations en Lisières — Outils</title>
<style>
  :root {
    --blue:      #5b8fc0;
    --blue-dark: #3a6a96;
    --blue-pale: #dce9f5;
    --grey:      #7a8a9a;
    --grey-light: #eef2f6;
    --text:      #2c3a48;
    --muted:     #8496a8;
    --white:     #ffffff;
    --border:    #c8d8e8;
    --accent:    #c9a84c;
    --genially:  #e8734a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--white); color: var(--text); font-family: Georgia, "Times New Roman", serif; min-height: 100vh; }
  .top-strip { background: var(--blue); height: 4px; }
  header {
    max-width: 960px; margin: 0 auto; padding: 2.5rem 2rem 2rem;
    display: flex; align-items: center; gap: 2rem; border-bottom: 1px solid var(--border);
  }
  .logo-wrap img { width: 180px; height: auto; display: block; }
  .header-text h1 { font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: normal; color: var(--blue-dark); line-height: 1.2; margin-bottom: 0.4rem; }
  .header-text .tagline { font-size: 0.88rem; color: var(--muted); line-height: 1.6; font-style: italic; max-width: 400px; }
  .filter-bar {
    max-width: 960px; margin: 1.8rem auto 0; padding: 0 2rem;
    display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center;
  }
  .filter-label { font-family: "Courier New", monospace; font-size: 0.68rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-right: 0.6rem; }
  .tab { font-family: "Courier New", monospace; font-size: 0.72rem; letter-spacing: 0.08em; padding: 0.3rem 0.85rem; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; background: transparent; color: var(--grey); transition: all 0.15s; }
  .tab:hover { border-color: var(--blue); color: var(--blue); }
  .tab.active { background: var(--blue); border-color: var(--blue); color: var(--white); }
  main { max-width: 960px; margin: 1.5rem auto 0; padding: 0 2rem 3rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .card { background: var(--white); padding: 1.3rem 1.4rem; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 0.4rem; transition: background 0.15s; position: relative; }
  .card:hover { background: var(--blue-pale); }
  .card:hover .card-arrow { opacity: 1; transform: translate(2px, -2px); }
  .badge { display: inline-block; font-family: "Courier New", monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); background: var(--blue-pale); border-radius: 2px; padding: 0.1rem 0.45rem; width: fit-content; }
  .badge.genially { color: var(--genially); background: #fdf0eb; }
  .badge.externe { color: #666; background: #f4f4f4; }
  .card-title { font-size: 1rem; line-height: 1.3; color: var(--blue-dark); font-weight: normal; margin-top: 0.2rem; }
  .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; flex-grow: 1; }
  .card-meta { font-family: "Courier New", monospace; font-size: 0.62rem; color: var(--border); margin-top: 0.4rem; }
  .card-arrow { position: absolute; top: 1.1rem; right: 1.1rem; color: var(--blue); font-size: 0.85rem; opacity: 0; transition: all 0.15s; }
  .card-note { font-size: 0.72rem; color: #b07a3a; font-style: italic; margin-top: 0.2rem; }
  .empty { grid-column: 1 / -1; background: var(--white); padding: 2rem; font-style: italic; color: var(--muted); font-size: 0.88rem; }
  footer { max-width: 960px; margin: 0 auto; padding: 1.2rem 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; font-family: "Courier New", monospace; font-size: 0.68rem; color: var(--border); }
  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .logo-wrap img { width: 140px; }
    header, .filter-bar, main, footer { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>

    date:  "2026-03"
  },
  {
    type:  "timeline",
    title: "Timeline RAP Creuse",

  // ── GENIALLY ───────────────────────────────────────────
  {
    type:  "genially",

const TYPE_LABELS = {
  timeline:  "Timeline",
  tentative: "Tentative",
  genially:  "Genially ↗",
  twine:     "Twine · récit",
  storymap:  "Storymap",
  html:      "HTML autonome"
};

function render(filter) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const items = filter === "all" ? ARTEFACTS : ARTEFACTS.filter(a => a.type === filter);
  if (items.length === 0) {
    grid.innerHTML = "<p class=\"empty\">Aucun artefact dans cette catégorie pour l\'instant.</p>";
    return;
  }
  items.forEach(a => {
    const card = document.createElement("a");
    card.href = a.url;
    if (a.type === "genially") card.target = "_blank";
    card.className = "card";
    const badgeClass = a.type === "genially" ? "badge genially" : "badge";
    card.innerHTML =
      "<span class=\"" + badgeClass + "\">" + (TYPE_LABELS[a.type] || a.type) + "</span>" +
      "<span class=\"card-title\">" + a.title + "</span>" +
      "<span class=\"card-desc\">" + a.desc + "</span>" +
      (a.note ? "<span class=\"card-note\">" + a.note + "</span>" : "") +
      (a.date ? "<span class=\"card-meta\">" + a.date + "</span>" : "") +
      "<span class=\"card-arrow\">↗</span>";
    grid.appendChild(card);
  });
  document.getElementById("count").textContent =
    items.length + " artefact" + (items.length > 1 ? "s" : "");
}

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render(btn.dataset.filter);
  });
});

render("all");
document.getElementById("count").textContent =
  ARTEFACTS.length + " artefacts";
