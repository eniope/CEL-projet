<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Strates synchronisées de l’espace vécu</title>

<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    margin: 0;
  }

  .app {
    max-width: 1000px;
    margin: auto;
    background: #fff;
    padding: 1.5rem;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.06);
  }

  h1 {
    font-size: 1.2rem;
    margin: 0 0 1rem 0;
  }

  /* =========================
     SCÈNE
     ========================= */

  .scene {
    position: relative;
    width: 100%;
    background: #fafafa;
    border: 1px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
  }

  .scene img {
    height: 100%;
    width: auto;
    max-width: none;
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    transition: transform 0.05s linear;
    user-select: none;
    pointer-events: none;
  }

  /* =========================
     SLIDER
     ========================= */

  .timeline {
    background: #fff;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,.12);
  }

  .timeline-track {
    position: relative;
    height: 30px;
  }

  .timeline-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: #222;
    transform: translateY(-50%);
  }

  .ticks {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    transform: translateY(-50%);
  }

  .tick {
    width: 1px;
    height: 12px;
    background: #999;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-top: .5rem;
  }

  input[type="range"] {
    flex: 1;
  }

  .value {
    width: 3rem;
    font-size: .8rem;
    text-align: right;
  }

  @media (min-width: 1024px) {
    .timeline {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(900px, 90vw);
      z-index: 10;
    }
  }
</style>
</head>

<body>

<div class="app">
  <h1 id="title">Strates synchronisées de l’espace vécu</h1>

  <div class="scene" id="scene">
    <img
      src="Coulissant.png"
      alt="Strates synchronisées"
      id="img"
    >
  </div>
</div>

<div class="timeline" id="timeline">
  <div class="timeline-track">
    <div class="timeline-line"></div>
    <div class="ticks">
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    </div>
  </div>

  <div class="slider-row">
    <label>Position</label>
    <input type="range" id="slider" min="0" max="100" value="50">
    <div class="value" id="value">50%</div>
  </div>
</div>

<script>
  const slider = document.getElementById('slider');
  const value = document.getElementById('value');
  const scene = document.getElementById('scene');
  const img = document.getElementById('img');
  const timeline = document.getElementById('timeline');
  const title = document.getElementById('title');

  const IMAGE_VERTICAL_OFFSET = -16; // 👈 AJUSTE ICI (-8, -12, -20…)

  function resizeScene() {
    const viewportHeight = window.innerHeight;
    const sliderHeight = timeline.getBoundingClientRect().height;
    const titleBottom = title.getBoundingClientRect().bottom;

    const sceneHeight =
      viewportHeight -
      sliderHeight -
      titleBottom -
      24;

    if (sceneHeight > 200) {
      scene.style.height = sceneHeight + 'px';
    }
  }

  function update() {
    const v = slider.value / 100;
    value.textContent = Math.round(v * 100) + '%';

    const sceneWidth = scene.getBoundingClientRect().width;
    const imgWidth = img.getBoundingClientRect().width;

    const maxOffset = (sceneWidth - imgWidth) / 2;
    const offsetX = (v - 0.5) * 2 * maxOffset;

    img.style.transform =
      `translate(${offsetX - imgWidth / 2}px, ${IMAGE_VERTICAL_OFFSET}px)`;
  }

  slider.addEventListener('input', update);
  window.addEventListener('resize', () => {
    resizeScene();
    update();
  });

  window.addEventListener('load', () => {
    resizeScene();
    update();
  });
</script>

</body>
</html>
