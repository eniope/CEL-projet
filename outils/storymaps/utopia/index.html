<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/storymapjs/latest/css/storymap.css">
  <style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; }
  </style>
</head>
<body>
<div id="mainstory" style="width:100%; height:100vh;"></div>
  <script src="https://cdn.knightlab.com/libs/storymapjs/latest/js/storymap-min.js"></script>
<script>
window.onload = function() {
  var storymap = new VCO.StoryMap('mainstory', 'utopia.json', {
    map_type: "zoomify",
    map_as_image: true,
    width: window.innerWidth,
    height: window.innerHeight
  });
  window.onresize = function() { storymap.updateDisplay(); };
};
</script>
</body>
</html>
